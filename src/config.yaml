site:
  name: Sauga Wellness Foundation
  site: 'https://saugawellness.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: # Add your Google Search Console verification ID here

# Default SEO metadata
metadata:
  title:
    default: Sauga Wellness Foundation
    template: '%s | Sauga Wellness Foundation'
  description: 'Sauga Wellness Foundation is a not-for-profit organization fostering resilient and healthy communities through culturally tailored health programs, newcomer wellness integration, and community health services in Mississauga and the Greater Toronto Area.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Sauga Wellness Foundation
    images:
      - url: '~/assets/images/sauga-wellness-og.svg'
        width: 1200
        height: 630
        alt: 'Sauga Wellness Foundation - Community Health Programs'
    type: website

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false

analytics:
  vendors:
    googleAnalytics:
      id: 'G-MM5GMXPZPM'

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
